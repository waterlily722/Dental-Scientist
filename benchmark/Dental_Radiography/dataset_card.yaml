name: "Dental_Radiography"
data_root: "data/Dental_Radiography"
split_file: "benchmark/Dental_Radiography/splits.json"

modality: "PAN"
task_type: "detection"
label_level: "instance-level"
target_name: "disease_name"
class_names: ["龋齿", "充填体", "阻生牙", "种植体"]

clinical_goal: "定位常见牙科异常并进行类别识别，用于报告草拟与质控。"
primary_metric: "mAP"
secondary_metrics: ["mAP50", "recall", "precision"]

augmentation:
  allowed: ["random_resized_crop", "rotation", "brightness_contrast"]
  disallowed: ["left_right_flip_when_quadrant_sensitive"]

imbalance:
  expected: likely

notes:
  - "原始标签来自 CSV bbox 标注，适合目标检测范式。"
